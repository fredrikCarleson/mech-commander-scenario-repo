[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/v1/scenarios"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/scenarios/:id"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/scenarios/:id/thumbnail"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/scenarios/:id/download"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/scenarios/:id/ratings"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/scenarios/:id/status"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/admin/scenarios"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/admin/scenarios/:id"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/admin/scenarios/:id/thumbnail"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/admin/scenarios/:id/approve"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/api/v1/admin/scenarios/:id/reject"
  to = "/.netlify/functions/api-v1"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' https://accounts.google.com https://oauth2.googleapis.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[functions]
  node_bundler = "esbuild"
  included_files = ["shared/**"]

[functions."api-v1"]
  node_bundler = "esbuild"

[[headers]]
  for = "/version-policy.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
